appId: com.emailed.desktop
productName: Emailed
copyright: Copyright © 2026 Emailed Inc.

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - package.json

asar: true

mac:
  category: public.app-category.productivity
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  darkModeSupport: true
  notarize: false

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  publisherName: Emailed Inc.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  deleteAppDataOnUninstall: false

linux:
  icon: resources/icons
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
  category: Office
  mimeTypes:
    - x-scheme-handler/emailed
    - x-scheme-handler/mailto

protocols:
  - name: Emailed
    schemes:
      - emailed

publish:
  provider: generic
  url: https://releases.emailed.com/desktop
  channel: latest

electronDownload:
  cache: .cache/electron
