name: AlecRae Standalone CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}  # manual "Deploy via Vapron" from the Actions tab

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

  deploy-vapron:
    name: Deploy via Vapron
    needs: quality
    runs-on: ubuntu-latest
    # Vapron is the permanent platform (CLAUDE.md). Gated on the repo variable
    # ENABLE_VAPRON_DEPLOY=true + the VAPRON_API_KEY secret. Until both are set
    # this job is skipped (green). Runbook: docs/infra/vapron-go-live.md
    if: needs.quality.result == 'success' && (github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && vars.ENABLE_VAPRON_DEPLOY == 'true'))
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy to Vapron (aiDeploy.quickDeploy)
        env:
          VAPRON_API_KEY: ${{ secrets.VAPRON_API_KEY }}
        run: bun run deploy:vapron

  gate:
    name: GateTest Report
    needs: quality
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report to GateTest
        env:
          GATETEST_API_URL: ${{ secrets.GATETEST_API_URL }}
          FLYWHEEL_API_KEY: ${{ secrets.FLYWHEEL_API_KEY }}
        run: |
          curl -s -X POST "${GATETEST_API_URL}/api/gate/result" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${FLYWHEEL_API_KEY}" \
            -d '{"repo":"${{ github.repository }}","commit_sha":"${{ github.sha }}","status":"${{ needs.quality.result }}","product":"alecrae"}' \
            --max-time 10 || true
