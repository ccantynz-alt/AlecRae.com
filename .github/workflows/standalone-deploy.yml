name: AlecRae Standalone CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: apps/web/.next/
          retention-days: 7

  gate:
    name: GateTest Quality Gate
    needs: quality
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report result to GateTest
        env:
          GATETEST_API_URL: ${{ secrets.GATETEST_API_URL }}
          FLYWHEEL_API_KEY: ${{ secrets.FLYWHEEL_API_KEY }}
        run: |
          curl -s -X POST "${GATETEST_API_URL}/api/gate/result" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${FLYWHEEL_API_KEY}" \
            -d '{"repo":"${{ github.repository }}","commit_sha":"${{ github.sha }}","status":"${{ needs.quality.result }}","product":"alecrae"}' \
            --max-time 10 || true

  deploy:
    name: Deploy to Crontech
    needs: quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.quality.result == 'success'
    environment: production
    steps:
      - name: Trigger Crontech deploy
        env:
          CRONTECH_DEPLOY_WEBHOOK: ${{ secrets.CRONTECH_DEPLOY_WEBHOOK }}
          CRONTECH_DEPLOY_TOKEN: ${{ secrets.CRONTECH_DEPLOY_TOKEN }}
        run: |
          curl -s -X POST "${CRONTECH_DEPLOY_WEBHOOK}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${CRONTECH_DEPLOY_TOKEN}" \
            -d '{"repo":"alecrae.com","commit_sha":"${{ github.sha }}","environment":"production"}' \
            --max-time 30
