apiVersion: apps/v1
kind: Deployment
metadata:
  name: reputation
  namespace: emailed
  labels:
    app.kubernetes.io/name: reputation
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: emailed-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: reputation
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reputation
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: emailed-platform
    spec:
      serviceAccountName: emailed-reputation
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: reputation
          image: registry.emailed.dev/emailed/reputation:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3005
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: emailed-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: emailed-secrets
                  key: REDIS_URL
            - name: CLICKHOUSE_URL
              valueFrom:
                configMapKeyRef:
                  name: emailed-config
                  key: CLICKHOUSE_URL
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: emailed-secrets
                  key: CLICKHOUSE_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
