apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: meilisearch
  namespace: emailed
  labels:
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/component: search
    app.kubernetes.io/part-of: emailed-platform
spec:
  serviceName: meilisearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: meilisearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: meilisearch
        app.kubernetes.io/component: search
        app.kubernetes.io/part-of: emailed-platform
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.11
          ports:
            - name: http
              containerPort: 7700
              protocol: TCP
          env:
            - name: MEILI_ENV
              value: "production"
            - name: MEILI_NO_ANALYTICS
              value: "true"
            - name: MEILI_DB_PATH
              value: "/meili_data"
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: emailed-secrets
                  key: MEILI_MASTER_KEY
          volumeMounts:
            - name: meilisearch-data
              mountPath: /meili_data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: meilisearch-data
        labels:
          app.kubernetes.io/name: meilisearch
          app.kubernetes.io/component: search
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: gp3
        resources:
          requests:
            storage: 50Gi

---
apiVersion: v1
kind: Service
metadata:
  name: meilisearch
  namespace: emailed
  labels:
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/component: search
    app.kubernetes.io/part-of: emailed-platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 7700
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: meilisearch
