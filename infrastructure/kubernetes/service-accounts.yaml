# ─── Service Accounts for all Emailed services ──────────────────────────────
# Each service gets its own ServiceAccount for RBAC and pod identity.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: emailed-api
  namespace: emailed
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: emailed-platform
  annotations:
    # For AWS IRSA (IAM Roles for Service Accounts), set the role ARN:
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/emailed-api
    description: "Service account for the API gateway"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: emailed-web
  namespace: emailed
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: emailed-platform

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: emailed-admin
  namespace: emailed
  labels:
    app.kubernetes.io/name: admin
    app.kubernetes.io/part-of: emailed-platform

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: emailed-mta
  namespace: emailed
  labels:
    app.kubernetes.io/name: mta
    app.kubernetes.io/part-of: emailed-platform
  annotations:
    # MTA needs S3 access for attachments
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/emailed-mta
    description: "Service account for the Mail Transfer Agent"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: emailed-inbound
  namespace: emailed
  labels:
    app.kubernetes.io/name: inbound
    app.kubernetes.io/part-of: emailed-platform
  annotations:
    # Inbound needs S3 access for attachment storage
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/emailed-inbound
    description: "Service account for inbound email processing"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: emailed-jmap
  namespace: emailed
  labels:
    app.kubernetes.io/name: jmap
    app.kubernetes.io/part-of: emailed-platform

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: emailed-reputation
  namespace: emailed
  labels:
    app.kubernetes.io/name: reputation
    app.kubernetes.io/part-of: emailed-platform
