apiVersion: v1
kind: ConfigMap
metadata:
  name: emailed-config
  namespace: emailed
  labels:
    app.kubernetes.io/name: emailed-config
    app.kubernetes.io/part-of: emailed-platform
data:
  # ─── Service URLs (internal cluster DNS) ───────────────────────────────────
  API_INTERNAL_URL: "http://api.emailed.svc.cluster.local"
  CLICKHOUSE_URL: "http://clickhouse.emailed.svc.cluster.local:8123"
  MEILI_URL: "http://meilisearch.emailed.svc.cluster.local:7700"
  JMAP_URL: "http://jmap.emailed.svc.cluster.local:8080"
  REPUTATION_URL: "http://reputation.emailed.svc.cluster.local"
  INBOUND_URL: "http://inbound.emailed.svc.cluster.local:8025"
  S3_ENDPOINT: "https://s3.amazonaws.com"

  # ─── Public URLs ───────────────────────────────────────────────────────────
  WEB_URL: "https://app.emailed.dev"
  API_URL: "https://api.emailed.dev"

  # ─── S3 / Object Storage ──────────────────────────────────────────────────
  S3_BUCKET: "emailed-attachments"
  S3_REGION: "us-east-1"

  # ─── MTA Configuration ────────────────────────────────────────────────────
  MTA_HOSTNAME: "mail.emailed.dev"
  DKIM_SELECTOR: "default"

  # ─── CORS ─────────────────────────────────────────────────────────────────
  CORS_ORIGINS: "https://app.emailed.dev,https://admin.emailed.dev"

  # ─── Observability ────────────────────────────────────────────────────────
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4318"
  OTEL_SERVICE_NAME: "emailed"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # ─── Feature Flags ────────────────────────────────────────────────────────
  ENABLE_AI_COMPOSE: "true"
  ENABLE_SMART_PRIORITY: "true"
  ENABLE_RELATIONSHIP_GRAPH: "true"

  # ─── Rate Limiting ────────────────────────────────────────────────────────
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  API_RATE_LIMIT_MAX: "500"

  # ─── Email Processing ─────────────────────────────────────────────────────
  MAX_ATTACHMENT_SIZE_MB: "25"
  MAX_RECIPIENTS_PER_MESSAGE: "500"
  BOUNCE_THRESHOLD_PERCENT: "5"
