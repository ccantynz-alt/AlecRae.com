apiVersion: apps/v1
kind: Deployment
metadata:
  name: inbound
  namespace: emailed
  labels:
    app.kubernetes.io/name: inbound
    app.kubernetes.io/component: mail
    app.kubernetes.io/part-of: emailed-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: inbound
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inbound
        app.kubernetes.io/component: mail
        app.kubernetes.io/part-of: emailed-platform
    spec:
      serviceAccountName: emailed-inbound
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - inbound
                topologyKey: kubernetes.io/hostname
      containers:
        - name: inbound
          image: registry.emailed.dev/emailed/inbound:latest
          imagePullPolicy: Always
          ports:
            - name: smtp
              containerPort: 25
              protocol: TCP
            - name: http
              containerPort: 8025
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: emailed-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: emailed-secrets
                  key: REDIS_URL
            - name: S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: emailed-config
                  key: S3_ENDPOINT
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: emailed-secrets
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: emailed-secrets
                  key: S3_SECRET_KEY
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: emailed-config
                  key: S3_BUCKET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: emailed-secrets
                  key: ANTHROPIC_API_KEY
            - name: MEILI_URL
              valueFrom:
                configMapKeyRef:
                  name: emailed-config
                  key: MEILI_URL
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: emailed-secrets
                  key: MEILI_MASTER_KEY
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: smtp
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: smtp
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: smtp
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      terminationGracePeriodSeconds: 120
