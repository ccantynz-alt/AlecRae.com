apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: emailed
  labels:
    app.kubernetes.io/name: admin
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: emailed-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: admin
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: emailed-platform
    spec:
      serviceAccountName: emailed-admin
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: admin
          image: registry.emailed.dev/emailed/admin:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3002"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: emailed-config
                  key: API_INTERNAL_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: admin
