apiVersion: apps/v1
kind: Deployment
metadata:
  name: jmap
  namespace: emailed
  labels:
    app.kubernetes.io/name: jmap
    app.kubernetes.io/component: mail
    app.kubernetes.io/part-of: emailed-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: jmap
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jmap
        app.kubernetes.io/component: mail
        app.kubernetes.io/part-of: emailed-platform
    spec:
      serviceAccountName: emailed-jmap
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: jmap
          image: registry.emailed.dev/emailed/jmap:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: imaps
              containerPort: 993
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: emailed-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: emailed-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: emailed-secrets
                  key: JWT_SECRET
            - name: MEILI_URL
              valueFrom:
                configMapKeyRef:
                  name: emailed-config
                  key: MEILI_URL
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: emailed-secrets
                  key: MEILI_MASTER_KEY
          volumeMounts:
            - name: tls-certs
              mountPath: /app/data/tls
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: tls-certs
          secret:
            secretName: jmap-tls-certs
      terminationGracePeriodSeconds: 60
