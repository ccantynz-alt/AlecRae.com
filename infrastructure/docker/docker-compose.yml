services:
  # ─── Core Infrastructure ─────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: emailed
      POSTGRES_USER: emailed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailed -d emailed"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - emailed-internal
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - emailed-internal
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    environment:
      CLICKHOUSE_DB: emailed_analytics
      CLICKHOUSE_USER: emailed
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dev_password}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - emailed-internal
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  meilisearch:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev_master_key}
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - emailed-internal
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-emailed}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dev_password}
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - emailed-internal
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ─── Application Services ────────────────────────────────────────────────────

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgres://emailed:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/emailed
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: emailed
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dev_password}
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev_master_key}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-emailed}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-dev_password}
      S3_BUCKET: emailed-attachments
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - emailed-internal
      - emailed-public
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      API_URL: http://api:3000
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - emailed-internal
      - emailed-public
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  admin:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.admin
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: "3002"
      API_URL: http://api:3000
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://localhost:3002/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - emailed-internal
      - emailed-public
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  mta:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.mta
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://emailed:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/emailed
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-emailed}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-dev_password}
      HOSTNAME: ${MTA_HOSTNAME:-mail.emailed.dev}
      DKIM_SELECTOR: ${DKIM_SELECTOR:-default}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 587 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - emailed-internal
      - emailed-public
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  inbound:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.inbound
    ports:
      - "2525:25"
      - "8025:8025"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://emailed:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/emailed
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-emailed}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-dev_password}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mta:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 25 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - emailed-internal
      - emailed-public
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  jmap:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.jmap
    ports:
      - "8080:8080"
      - "993:993"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://emailed:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/emailed
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - emailed-internal
      - emailed-public
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  reputation:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.reputation
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://emailed:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/emailed
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://localhost:3005/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - emailed-internal
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

# ─── Networks ────────────────────────────────────────────────────────────────

networks:
  emailed-internal:
    driver: bridge
    internal: true
  emailed-public:
    driver: bridge

# ─── Volumes ─────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  meilisearch_data:
    driver: local
  minio_data:
    driver: local
